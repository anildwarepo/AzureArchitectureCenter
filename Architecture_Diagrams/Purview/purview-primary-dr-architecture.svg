  <rect x="200" y="510" width="125" height="52" rx="6"
        fill="#fff" stroke="#5eead4" stroke-width="1.5"/>
  <text x="263" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#134e4a">Classifications</text>
  <text x="263" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">Labels</text>

  <text x="470" y="500" text-anchor="middle"
        font-size="10" font-weight="600" fill="#d97706">via REST APIs</text>
  <rect x="360" y="510" width="120" height="52" rx="6"
        fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="420" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#78350f">Data Products</text>
  <text x="420" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">REST only</text>
  <rect x="495" y="510" width="110" height="52" rx="6"
        fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="550" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#78350f">Governance</text>
  <text x="550" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">Domains</text>

  <text x="320" y="590" text-anchor="middle"
        font-size="10" fill="#64748b" font-style="italic">Kafka: Data Map entities + classifications · REST: Data Products + Governance Domains</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ROW 4 — DR DATA MAP (right)                     -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="660" y="460" width="600" height="205" rx="10"
        fill="#f5f3ff" fill-opacity="0.3" stroke="#8b5cf6"
        stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="675" y="480" font-size="12" font-weight="700" fill="#7c3aed">
    DISASTER RECOVERY — TENANT B PURVIEW</text>

  <text x="810" y="500" text-anchor="middle"
        font-size="10" font-weight="600" fill="#0d9488">via Kafka Events</text>
  <rect x="690" y="510" width="120" height="52" rx="6"
        fill="#fff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="750" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#5b21b6">Data Map</text>
  <text x="750" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">Entities</text>
  <rect x="825" y="510" width="125" height="52" rx="6"
        fill="#fff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="888" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#5b21b6">Classifications</text>
  <text x="888" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">Labels</text>

  <text x="1095" y="500" text-anchor="middle"
        font-size="10" font-weight="600" fill="#d97706">via REST APIs</text>
  <rect x="980" y="510" width="120" height="52" rx="6"
        fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1040" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#78350f">Data Products</text>
  <text x="1040" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">REST only</text>
  <rect x="1115" y="510" width="125" height="52" rx="6"
        fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1178" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#78350f">Governance</text>
  <text x="1178" y="548" text-anchor="middle"
        font-size="10" fill="#64748b">Domains</text>

  <text x="950" y="590" text-anchor="middle"
        font-size="10" fill="#64748b" font-style="italic">Kafka: Data Map entities + classifications · REST: Data Products + Governance Domains</text>

  <text x="960" y="640" text-anchor="middle"
        font-size="10" fill="#7c3aed" font-style="italic">↺ Replay events for DR resynchronization</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- FOREGROUND — CLEAN ARROWS (vertical + horizontal) -->
  <!-- ════════════════════════════════════════════════ -->

  <!-- ① Connectors → Data Sources (upward) -->
  <line x1="330" y1="222" x2="330" y2="185"
        stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="300" cy="203" r="10" fill="#2563eb"/>
  <text x="300" y="207" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#fff">1</text>
  <rect x="340" y="194" width="94" height="16" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="387" y="206" text-anchor="middle"
        font-size="10" fill="#64748b">Scan Sources</text>

  <!-- ② Connectors → Purview Primary (downward) -->
  <line x1="330" y1="287" x2="330" y2="328"
        stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="300" cy="308" r="10" fill="#0f766e"/>
  <text x="300" y="312" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#fff">2</text>
  <rect x="340" y="300" width="125" height="16" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="403" y="312" text-anchor="middle"
        font-size="10" fill="#64748b">Feed Scan Results</text>

  <!-- ③ Purview Primary → Custom App (horizontal right) -->
  <line x1="600" y1="371" x2="738" y2="371"
        stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="628" cy="371" r="10" fill="#d97706"/>
  <text x="628" y="375" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#fff">3</text>
  <rect x="645" y="362" width="86" height="16" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="688" y="374" text-anchor="middle"
        font-size="10" fill="#64748b">Kafka Events</text>

  <!-- ④ Custom App → Primary Data Map (downward left) -->
  <line x1="860" y1="412" x2="330" y2="458"
        stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="595" cy="430" r="10" fill="#0f766e"/>
  <text x="595" y="434" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#fff">4</text>
  <rect x="610" y="422" width="108" height="16" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="664" y="434" text-anchor="middle"
        font-size="10" fill="#64748b">SP-A · REST APIs</text>

  <!-- ⑤ Custom App → DR Data Map (straight down) -->
  <line x1="990" y1="412" x2="990" y2="458"
        stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="960" cy="435" r="10" fill="#7c3aed"/>
  <text x="960" y="439" text-anchor="middle"
        font-size="10" font-weight="bold" fill="#fff">5</text>
  <rect x="1000" y="427" width="108" height="16" rx="3" fill="#fff" fill-opacity="0.9"/>
  <text x="1054" y="439" text-anchor="middle"
        font-size="10" fill="#64748b">SP-B · REST APIs</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- LEGEND                                          -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="40" y="700" width="1220" height="100" rx="10"
        fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="722" font-size="12" font-weight="700" fill="#1e293b">Legend</text>

  <rect x="130" y="712" width="16" height="14" rx="3"
        fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="152" y="724" font-size="10" fill="#64748b">Data Sources</text>

  <rect x="250" y="712" width="16" height="14" rx="3"
        fill="#f0fdfa" stroke="#14b8a6" stroke-width="1"/>
  <text x="272" y="724" font-size="10" fill="#64748b">Connectors / Primary</text>

  <rect x="395" y="712" width="16" height="14" rx="3"
        fill="#fffbeb" stroke="#fbbf24" stroke-width="1"/>
  <text x="417" y="724" font-size="10" fill="#64748b">Azure Functions</text>

  <rect x="530" y="712" width="16" height="14" rx="3"
        fill="#ede9fe" stroke="#a78bfa" stroke-width="1"/>
  <text x="552" y="724" font-size="10" fill="#64748b">DR (Tenant B)</text>

  <rect x="660" y="712" width="16" height="14" rx="3"
        fill="#fff" stroke="#5eead4" stroke-width="1.5"/>
  <text x="682" y="724" font-size="10" fill="#64748b">Kafka-Replicated</text>

  <rect x="800" y="712" width="16" height="14" rx="3"
        fill="#fff" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="822" y="724" font-size="10" fill="#64748b">REST API-Replicated</text>

  <text x="60" y="750" font-size="10" font-weight="600" fill="#475569">Flow:</text>
  <text x="95" y="750" font-size="10" fill="#64748b">
    1 Connectors scan data sources · 2 Scan results feed into Purview Primary ·
    3 Purview emits ATLAS_ENTITIES Kafka events to Azure Functions</text>
  <text x="95" y="766" font-size="10" fill="#64748b">
    4 Azure Functions replicates to Primary via SP-A + REST APIs (Data Products, Governance Domains) ·
    5 Azure Functions replicates to DR via SP-B + REST APIs</text>

  <text x="60" y="786" font-size="10" fill="#64748b">
    Custom App does not access data sources directly — it only receives Kafka events emitted by Purview</text>
</svg>
