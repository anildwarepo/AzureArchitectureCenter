  <text x="330" y="375" text-anchor="middle"
        font-size="12" font-weight="600" fill="#134e4a">Microsoft Purview Account</text>
  <text x="330" y="395" text-anchor="middle"
        font-size="10" fill="#64748b">Active Governance Instance · Emits ATLAS_ENTITIES Kafka Events</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ROW 3 — CUSTOM APP (right side, same row)       -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="740" y="330" width="500" height="82" rx="8"
        fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="740" y="330" width="500" height="24" rx="8" fill="url(#hdr-amber)"/>
  <rect x="740" y="348" width="500" height="6" fill="url(#hdr-amber)"/>
  <text x="990" y="348" text-anchor="middle"
        font-size="12" font-weight="700" fill="#fff">CUSTOM APPLICATION — AZURE FUNCTIONS</text>
  <!-- Azure Functions icon (left of label text) -->
  <g transform="translate(830, 366) scale(1.5)">
    <g><path d="M2.37,7.475H3.2a.267.267,0,0,1,.267.267v6.148a.533.533,0,0,1-.533.533H2.1a0,0,0,0,1,0,0V7.741a.267.267,0,0,1,.267-.267Z" transform="translate(12.507 16.705) rotate(134.919)" fill="#50e6ff"/><path d="M2.325,3.6h.833a.267.267,0,0,1,.267.267v6.583a0,0,0,0,1,0,0H2.591a.533.533,0,0,1-.533-.533V3.865A.267.267,0,0,1,2.325,3.6Z" transform="translate(5.759 0.114) rotate(44.919)" fill="#1490df"/></g>
    <g><path d="M14.53,7.475h.833a.533.533,0,0,1,.533.533v6.148a.267.267,0,0,1-.267.267H14.8a.267.267,0,0,1-.267-.267V7.475a0,0,0,0,1,0,0Z" transform="translate(12.223 -7.555) rotate(45.081)" fill="#50e6ff"/><path d="M15.108,3.6h.833a0,0,0,0,1,0,0v6.583a.267.267,0,0,1-.267.267h-.833a.267.267,0,0,1-.267-.267V4.131a.533.533,0,0,1,.533-.533Z" transform="translate(31.022 1.222) rotate(135.081)" fill="#1490df"/></g>
    <path d="M8.459,9.9H4.87a.193.193,0,0,1-.2-.181.166.166,0,0,1,.018-.075L8.991,1.13a.206.206,0,0,1,.186-.106h4.245a.193.193,0,0,1,.2.181.165.165,0,0,1-.035.1L8.534,7.966h4.928a.193.193,0,0,1,.2.181.176.176,0,0,1-.052.122L5.421,16.788c-.077.046-.624.5-.356-.189h0Z" fill="url(#func-grad)"/>
  </g>
  <text x="1010" y="382" text-anchor="middle"
        font-size="12" font-weight="600" fill="#78350f">Receives Kafka Events from Purview</text>
  <text x="990" y="400" text-anchor="middle"
        font-size="10" fill="#64748b">Replicates via REST APIs · SP-A (Primary) · SP-B (DR)</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ROW 4 — PRIMARY DATA MAP (left)                 -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="40" y="460" width="580" height="205" rx="10"
        fill="#f0fdfa" fill-opacity="0.3" stroke="#14b8a6"
        stroke-width="1.5" stroke-dasharray="8,4"/>
  <text x="55" y="480" font-size="12" font-weight="700" fill="#0f766e">
    PRIMARY — DATA MAP &amp; GOVERNANCE</text>

  <text x="180" y="500" text-anchor="middle"
        font-size="10" font-weight="600" fill="#0d9488">via Kafka Events</text>
  <rect x="65" y="510" width="120" height="52" rx="6"
        fill="#fff" stroke="#5eead4" stroke-width="1.5"/>
  <text x="125" y="532" text-anchor="middle"
        font-size="11" font-weight="600" fill="#134e4a">Data Map</text>
  <text x="125" y="548" text-anchor="middle"
