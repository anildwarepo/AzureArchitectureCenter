  <rect x="120" y="222" width="420" height="24" rx="8" fill="url(#hdr-teal)"/>
  <rect x="120" y="240" width="420" height="6" fill="url(#hdr-teal)"/>
  <text x="330" y="240" text-anchor="middle"
