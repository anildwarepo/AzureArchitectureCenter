  <text x="330" y="268" text-anchor="middle"
        font-size="11" font-weight="600" fill="#134e4a">Scan &amp; Ingest Metadata from Data Sources</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ROW 3 — PURVIEW PRIMARY (left side)             -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="60" y="330" width="540" height="82" rx="8"
