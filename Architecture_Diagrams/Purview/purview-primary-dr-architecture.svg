  <rect x="60" y="330" width="540" height="24" rx="8" fill="url(#hdr-teal)"/>
  <rect x="60" y="348" width="540" height="6" fill="url(#hdr-teal)"/>
  <text x="330" y="348" text-anchor="middle"
