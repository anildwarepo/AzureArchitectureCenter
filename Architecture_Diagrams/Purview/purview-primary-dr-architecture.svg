<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 920"
     font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5"
            markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <linearGradient id="hdr-blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/><stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="hdr-teal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e"/><stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="hdr-purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="hdr-amber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d97706"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="func-grad" x1="-175.993" y1="-343.723" x2="-175.993" y2="-359.232"
        gradientTransform="translate(212.573 370.548) scale(1.156 1.029)" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fea11b"/><stop offset="0.284" stop-color="#fea51a"/>
      <stop offset="0.547" stop-color="#feb018"/><stop offset="0.8" stop-color="#ffc314"/>
      <stop offset="1" stop-color="#ffd70f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1300" height="920" rx="12" fill="#fafafa"/>

  <!-- Title -->
  <text x="650" y="34" text-anchor="middle"
        font-size="20" font-weight="700" fill="#1e293b">Microsoft Purview — Primary &amp; Disaster Recovery Architecture</text>
  <text x="650" y="54" text-anchor="middle"
        font-size="12" fill="#64748b">Cross-Tenant Governance Replication · Kafka Events + REST APIs</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ROW 1 — DATA SOURCES (left side)                -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="60" y="72" width="540" height="110" rx="10"
        fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="60" y="72" width="540" height="26" rx="10" fill="url(#hdr-blue)"/>
  <rect x="60" y="88" width="540" height="10" fill="url(#hdr-blue)"/>
  <text x="330" y="90" text-anchor="middle"
        font-size="11" font-weight="700" fill="#fff">TENANT A — DATA SOURCES</text>

  <rect x="80" y="106" width="150" height="60" rx="8"
        fill="#fff" stroke="#60a5fa" stroke-width="1" filter="url(#shadow)"/>
  <text x="155" y="132" text-anchor="middle"
        font-size="12" font-weight="600" fill="#1e3a8a">Azure Cloud</text>
  <text x="155" y="148" text-anchor="middle"
        font-size="10" fill="#64748b">Data Services</text>

  <rect x="250" y="106" width="150" height="60" rx="8"
        fill="#fff" stroke="#60a5fa" stroke-width="1" filter="url(#shadow)"/>
  <text x="325" y="132" text-anchor="middle"
        font-size="12" font-weight="600" fill="#1e3a8a">Microsoft 365</text>
  <text x="325" y="148" text-anchor="middle"
        font-size="10" fill="#64748b">M365 Sources</text>

  <rect x="420" y="106" width="160" height="60" rx="8"
        fill="#fff" stroke="#60a5fa" stroke-width="1" filter="url(#shadow)"/>
  <text x="500" y="132" text-anchor="middle"
        font-size="12" font-weight="600" fill="#1e3a8a">On-Premises</text>
  <text x="500" y="148" text-anchor="middle"
        font-size="10" fill="#64748b">On-Prem Sources</text>

  <!-- ════════════════════════════════════════════════ -->
  <!-- ROW 2 — PURVIEW CONNECTORS (left side)          -->
  <!-- ════════════════════════════════════════════════ -->
  <rect x="120" y="222" width="420" height="65" rx="8"
