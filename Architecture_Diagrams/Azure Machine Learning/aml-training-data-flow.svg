<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 540" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <!-- Fully visible arrow heads. refX=10 puts the tip at the line endpoint -->
    <marker id="arr"   markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#475569"/></marker>
    <marker id="arrB"  markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#0ea5e9"/></marker>
    <marker id="arrP"  markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#8b5cf6"/></marker>
    <marker id="arrG"  markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L10,5 L0,10 z" fill="#10b981"/></marker>
  </defs>

  <rect width="1180" height="540" fill="#f8fafc"/>
  <text x="590" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Training Data Flow (Dev Only)</text>

  <!-- ═══ FABRIC PANEL ═══ -->
  <rect x="20" y="60" width="320" height="450" rx="10" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="180" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">EXTERNAL · Microsoft Fabric</text>

  <!-- OneLake (top) -->
  <rect x="50" y="110" width="260" height="70" rx="8" fill="#fff" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="180" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">🟢 OneLake (Lakehouse / Delta)</text>
  <text x="180" y="155" text-anchor="middle" font-size="10" fill="#0369a1">curated training data</text>
  <text x="180" y="170" text-anchor="middle" font-size="10" fill="#0369a1">+ feature tables</text>

  <!-- Fabric Pipeline (bottom) -->
  <rect x="50" y="380" width="260" height="70" rx="8" fill="#fff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="180" y="405" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">🔄 Fabric Pipeline</text>
  <text x="180" y="425" text-anchor="middle" font-size="10" fill="#5b21b6">scheduler / orchestrator</text>

  <!-- ═══ AML PANEL ═══ -->
  <rect x="430" y="60" width="730" height="450" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
  <text x="795" y="84" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">AZURE MACHINE LEARNING (Dev)</text>

  <!-- Row 1: AML Datastore (left) + Training Compute (right) -->
  <rect x="460" y="110" width="280" height="70" rx="8" fill="#fff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="600" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#0369a1">AML Datastore → AML Dataset</text>
  <text x="600" y="155" text-anchor="middle" font-size="10" fill="#0369a1">versioned, no copy</text>
  <text x="600" y="170" text-anchor="middle" font-size="10" fill="#0369a1">references OneLake via shortcut</text>

  <rect x="820" y="110" width="310" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="975" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">AML Training Compute Cluster</text>
  <text x="975" y="155" text-anchor="middle" font-size="10" fill="#0c4a6e">3 GPU nodes</text>
  <text x="975" y="170" text-anchor="middle" font-size="10" fill="#0c4a6e">auto-scale to zero</text>

  <!-- Row 2: Feature Store (left) + Trained Model (right) -->
  <rect x="460" y="260" width="280" height="70" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="600" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#5b21b6">Feature Store (Offline)</text>
  <text x="600" y="305" text-anchor="middle" font-size="10" fill="#5b21b6">+ Pre-trained Models (Blob)</text>

  <rect x="820" y="260" width="310" height="70" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="975" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Trained Model</text>
  <text x="975" y="305" text-anchor="middle" font-size="10" fill="#065f46">artifact + metrics + lineage</text>

  <!-- Row 3: Model Registry (right column only) -->
  <rect x="820" y="400" width="310" height="70" rx="8" fill="#fff" stroke="#10b981" stroke-width="1.5"/>
  <text x="975" y="425" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">AML Model Registry (Dev)</text>
  <text x="975" y="445" text-anchor="middle" font-size="10" fill="#065f46">versioned models + tags</text>

  <!-- ═══ ARROWS — orthogonal, no diagonals through boxes ═══ -->

  <!-- 1) OneLake → AML Datastore (cross-boundary, top row, gutter only) -->
  <line x1="312" y1="145" x2="455" y2="145" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrB)"/>
  <rect x="332" y="118" width="100" height="18" rx="3" fill="#fff" stroke="#0ea5e9" stroke-width="0.7"/>
  <text x="382" y="131" text-anchor="middle" font-size="10" fill="#0369a1" font-weight="700">OneLake shortcut</text>

  <!-- 2) AML Datastore → Training Compute (top row) -->
  <line x1="742" y1="145" x2="817" y2="145" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="780" y="138" text-anchor="middle" font-size="9" fill="#475569" font-style="italic">data ref</text>

  <!-- 3) Feature Store → Training Compute (orthogonal: out right, up to row 1) -->
  <polyline points="742,295 780,295 780,160 817,160" stroke="#8b5cf6" stroke-width="1.8" fill="none" marker-end="url(#arrP)"/>
  <text x="790" y="225" font-size="9" fill="#5b21b6" font-style="italic">features</text>

  <!-- 4) Fabric Pipeline → Training Compute (cross-boundary, orthogonal: out right, down through gutter under row 1, up into compute from below) -->
  <!-- Route stays in the gutter strip y=370..380 then up the gap between Datastore (right edge x=740) and Training Compute (left edge x=820) -->
  <polyline points="312,415 380,415 380,500 780,500 780,185" stroke="#8b5cf6" stroke-width="2.5" fill="none" marker-end="url(#arrP)"/>
  <rect x="395" y="478" width="320" height="20" rx="3" fill="#fff" stroke="#8b5cf6" stroke-width="0.7"/>
  <text x="555" y="493" text-anchor="middle" font-size="11" fill="#5b21b6" font-weight="700">submit job (Managed Identity, REST)</text>

  <!-- 5) Training Compute → Trained Model (right column, vertical) -->
  <line x1="975" y1="182" x2="975" y2="255" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6) Trained Model → Model Registry (right column, vertical) -->
  <line x1="975" y1="332" x2="975" y2="395" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrG)"/>
  <text x="985" y="368" font-size="10" fill="#065f46" font-style="italic">register</text>
</svg>
