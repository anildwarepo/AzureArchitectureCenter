<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e8ecf4"/>
    </linearGradient>
    <linearGradient id="orchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="candidateGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="demandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="matchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="mcpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="searchGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="cosmosGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#005a9e"/>
    </linearGradient>
    <linearGradient id="fastapiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="uiGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowIndigo" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="arrowTeal" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0891b2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="820" rx="16" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="550" y="38" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">TalentIQ — Agent Framework Handoff Architecture</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748b">Microsoft Agent Framework · HandoffBuilder · MCP Server · Azure AI Search · Cosmos DB</text>

  <!-- ─── React UI ─── -->
  <rect x="420" y="76" width="260" height="50" rx="10" fill="url(#uiGrad)" filter="url(#shadow)"/>
  <text x="550" y="100" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">React 19 UI</text>
  <text x="550" y="116" text-anchor="middle" font-size="10" fill="#fce7f3">MSAL + Entra ID · localhost:3000</text>

  <!-- Arrow: UI → FastAPI -->
  <line x1="550" y1="126" x2="550" y2="148" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ─── FastAPI Backend ─── -->
  <rect x="370" y="150" width="360" height="50" rx="10" fill="url(#fastapiGrad)" filter="url(#shadow)"/>
  <text x="550" y="174" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">FastAPI Backend · /responses</text>
  <text x="550" y="190" text-anchor="middle" font-size="10" fill="#94a3b8">OpenAI Responses API compatible · SSE streaming · port 8088</text>

  <!-- Arrow: FastAPI → Orchestrator -->
  <line x1="550" y1="200" x2="550" y2="230" stroke="#4f46e5" stroke-width="2.5" marker-end="url(#arrowIndigo)"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- Agent Framework zone -->
  <rect x="60" y="225" width="980" height="230" rx="14" fill="#fff" fill-opacity="0.55" stroke="#c7d2fe" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="80" y="248" font-size="11" font-weight="600" fill="#6366f1">Agent Framework · HandoffBuilder</text>

  <!-- ─── Orchestrator Agent ─── -->
  <rect x="370" y="256" width="360" height="56" rx="10" fill="url(#orchGrad)" filter="url(#shadow)"/>
  <text x="550" y="280" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Orchestrator Agent</text>
  <text x="550" y="298" text-anchor="middle" font-size="10" fill="#c7d2fe">No tools · Auto-generated handoff tools · Triage &amp; routing</text>

  <!-- Handoff arrows: Orchestrator → specialists -->
  <!-- Left: Orchestrator → Candidate Agent -->
  <path d="M440,312 Q300,340 220,370" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowTeal)"/>
  <text x="290" y="340" font-size="9" fill="#0ea5e9" font-weight="600" transform="rotate(-20 290 340)">handoff</text>

  <!-- Center: Orchestrator → Demand Agent -->
  <line x1="550" y1="312" x2="550" y2="370" stroke="#10b981" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowGray)"/>
  <text x="560" y="348" font-size="9" fill="#10b981" font-weight="600">handoff</text>

  <!-- Right: Orchestrator → Matching Agent -->
  <path d="M660,312 Q800,340 880,370" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrowGray)"/>
  <text x="790" y="340" font-size="9" fill="#d97706" font-weight="600" transform="rotate(20 790 340)">handoff</text>

  <!-- ─── Candidate Agent ─── -->
  <rect x="100" y="372" width="240" height="72" rx="10" fill="url(#candidateGrad)" filter="url(#shadow)"/>
  <text x="220" y="396" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Candidate Agent</text>
  <text x="220" y="414" text-anchor="middle" font-size="10" fill="#e0f2fe">MCP tools (scoped):</text>
  <text x="220" y="430" text-anchor="middle" font-size="9" fill="#bae6fd" font-family="Consolas, monospace">search_candidates · get_bench_count</text>

  <!-- ─── Demand Agent ─── -->
  <rect x="430" y="372" width="240" height="72" rx="10" fill="url(#demandGrad)" filter="url(#shadow)"/>
  <text x="550" y="396" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Demand Agent</text>
  <text x="550" y="414" text-anchor="middle" font-size="10" fill="#d1fae5">MCP tools (scoped):</text>
  <text x="550" y="430" text-anchor="middle" font-size="9" fill="#a7f3d0" font-family="Consolas, monospace">search_demands · get_demand</text>

  <!-- ─── Matching Agent ─── -->
  <rect x="760" y="372" width="240" height="72" rx="10" fill="url(#matchGrad)" filter="url(#shadow)"/>
  <text x="880" y="396" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Matching Agent</text>
  <text x="880" y="414" text-anchor="middle" font-size="10" fill="#fef3c7">MCP tools (scoped):</text>
  <text x="880" y="430" text-anchor="middle" font-size="9" fill="#fde68a" font-family="Consolas, monospace">match_candidates_for_demand</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- MCPStreamableHTTPTool arrows -->
  <line x1="220" y1="444" x2="220" y2="498" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="550" y1="444" x2="550" y2="498" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="880" y1="444" x2="880" y2="498" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <text x="146" y="478" font-size="9" fill="#7c3aed" font-weight="600">MCPStreamableHTTPTool</text>
  <text x="476" y="478" font-size="9" fill="#7c3aed" font-weight="600">MCPStreamableHTTPTool</text>
  <text x="806" y="478" font-size="9" fill="#7c3aed" font-weight="600">MCPStreamableHTTPTool</text>

  <!-- ─── MCP Server ─── -->
  <rect x="120" y="500" width="860" height="80" rx="12" fill="url(#mcpGrad)" filter="url(#shadow)"/>
  <text x="550" y="526" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">MCP Server — FastMCP on Azure Functions (Flex Consumption)</text>
  <text x="550" y="544" text-anchor="middle" font-size="10" fill="#ede9fe">Streamable-HTTP transport · Stateless · Managed VNet</text>

  <!-- MCP tool pills -->
  <rect x="148" y="554" width="140" height="20" rx="10" fill="#fff" fill-opacity="0.2"/>
  <text x="218" y="568" text-anchor="middle" font-size="9" fill="#fff" font-family="Consolas, monospace">search_candidates</text>

  <rect x="300" y="554" width="155" height="20" rx="10" fill="#fff" fill-opacity="0.2"/>
  <text x="377" y="568" text-anchor="middle" font-size="9" fill="#fff" font-family="Consolas, monospace">match_candidates_for_demand</text>

  <rect x="468" y="554" width="110" height="20" rx="10" fill="#fff" fill-opacity="0.2"/>
  <text x="523" y="568" text-anchor="middle" font-size="9" fill="#fff" font-family="Consolas, monospace">get_bench_count</text>

  <rect x="590" y="554" width="120" height="20" rx="10" fill="#fff" fill-opacity="0.2"/>
  <text x="650" y="568" text-anchor="middle" font-size="9" fill="#fff" font-family="Consolas, monospace">search_demands</text>

  <rect x="722" y="554" width="100" height="20" rx="10" fill="#fff" fill-opacity="0.2"/>
  <text x="772" y="568" text-anchor="middle" font-size="9" fill="#fff" font-family="Consolas, monospace">get_demand</text>

  <!-- Arrows: MCP → data sources -->
  <line x1="380" y1="580" x2="310" y2="640" stroke="#0891b2" stroke-width="2" marker-end="url(#arrowTeal)"/>
  <line x1="720" y1="580" x2="790" y2="640" stroke="#0078d4" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- ─── Azure AI Search ─── -->
  <rect x="120" y="644" width="360" height="70" rx="12" fill="url(#searchGrad)" filter="url(#shadow)"/>
  <text x="300" y="672" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Azure AI Search</text>
  <text x="300" y="690" text-anchor="middle" font-size="10" fill="#cffafe">Full-text + vector search (HNSW, cosine)</text>
  <text x="300" y="704" text-anchor="middle" font-size="9" fill="#a5f3fc" font-family="Consolas, monospace">candidates-index · demands-index</text>

  <!-- ─── Cosmos DB ─── -->
  <rect x="620" y="644" width="360" height="70" rx="12" fill="url(#cosmosGrad)" filter="url(#shadow)"/>
  <text x="800" y="672" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">Azure Cosmos DB</text>
  <text x="800" y="690" text-anchor="middle" font-size="10" fill="#dbeafe">NoSQL · Serverless · Partitioned by country</text>
  <text x="800" y="704" text-anchor="middle" font-size="9" fill="#bfdbfe" font-family="Consolas, monospace">candidates · demands</text>

  <!-- ─── Foundry / LLM ─── -->
  <rect x="830" y="256" width="190" height="56" rx="10" fill="#1e1b4b" filter="url(#shadow)"/>
  <text x="925" y="280" text-anchor="middle" font-size="12" font-weight="700" fill="#c7d2fe">Azure AI Foundry</text>
  <text x="925" y="296" text-anchor="middle" font-size="9" fill="#a5b4fc">FoundryChatClient · gpt-4o-mini</text>

  <!-- Arrow: Orchestrator → Foundry (LLM calls) -->
  <line x1="730" y1="280" x2="828" y2="280" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 2" marker-end="url(#arrowIndigo)"/>
  <text x="780" y="273" font-size="8" fill="#6366f1">LLM</text>

  <!-- ─── Auth / Identity ─── -->
  <rect x="120" y="746" width="860" height="42" rx="10" fill="#fff" fill-opacity="0.6" stroke="#cbd5e1" stroke-width="1"/>
  <text x="550" y="766" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Authentication: Microsoft Entra ID · DefaultAzureCredential · No API keys</text>
  <text x="550" y="780" text-anchor="middle" font-size="9" fill="#94a3b8">RBAC: Search Index Data Contributor · Cosmos DB Built-in Data Contributor · Cognitive Services OpenAI User</text>

  <!-- ─── Legend ─── -->
  <rect x="60" y="76" width="200" height="72" rx="8" fill="#fff" fill-opacity="0.7" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="94" font-size="10" font-weight="600" fill="#475569">Legend</text>
  <line x1="80" y1="106" x2="108" y2="106" stroke="#4f46e5" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="114" y="110" font-size="9" fill="#475569">Handoff (auto-generated)</text>
  <line x1="80" y1="122" x2="108" y2="122" stroke="#7c3aed" stroke-width="2"/>
  <text x="114" y="126" font-size="9" fill="#475569">MCP tool call</text>
  <line x1="80" y1="138" x2="108" y2="138" stroke="#64748b" stroke-width="2"/>
  <text x="114" y="142" font-size="9" fill="#475569">HTTP / data flow</text>
</svg>