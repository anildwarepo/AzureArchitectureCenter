<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="oauthGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="apiKeyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="entraGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="tierGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="freeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="premGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="url(#bgGrad)"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="56" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="1100" height="36" fill="url(#headerGrad)"/>
  <text x="550" y="37" text-anchor="middle" fill="#fff" font-size="20" font-weight="700" letter-spacing="0.5">
    Authentication &amp; User Tiering Patterns for MCP Servers
  </text>

  <!-- ============================================================ -->
  <!-- SECTION 1: Auth Methods (top row)                            -->
  <!-- ============================================================ -->
  <text x="40" y="92" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5" text-transform="uppercase">
    AUTHENTICATION METHODS — WHEN TO USE
  </text>
  <line x1="40" y1="100" x2="1060" y2="100" stroke="#334155" stroke-width="1"/>

  <!-- OAuth 2.1 / PKCE Card -->
  <rect x="40" y="112" width="320" height="175" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="112" width="320" height="38" rx="10" fill="url(#oauthGrad)"/>
  <rect x="40" y="140" width="320" height="10" fill="url(#oauthGrad)"/>
  <!-- Lock icon -->
  <g transform="translate(56, 122)">
    <rect x="3" y="10" width="14" height="11" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M6 10V7a4 4 0 0 1 8 0v3" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="80" y="137" fill="#fff" font-size="14" font-weight="700">OAuth 2.1 / PKCE</text>
  <text x="60" y="170" fill="#cbd5e1" font-size="11">• Browser-based SPA / public clients</text>
  <text x="60" y="188" fill="#cbd5e1" font-size="11">• Authorization Code + PKCE (no secret)</text>
  <text x="60" y="206" fill="#cbd5e1" font-size="11">• Per-user identity &amp; consent</text>
  <text x="60" y="224" fill="#cbd5e1" font-size="11">• Supports refresh tokens</text>
  <text x="60" y="248" fill="#60a5fa" font-size="10" font-weight="600" font-style="italic">
    ✦ Best for: interactive users, delegated access
  </text>
  <text x="60" y="264" fill="#60a5fa" font-size="10" font-weight="600" font-style="italic">
    ✦ FastMCP: AzureProvider(auth=...)
  </text>

  <!-- API Key Card -->
  <rect x="390" y="112" width="320" height="175" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="390" y="112" width="320" height="38" rx="10" fill="url(#apiKeyGrad)"/>
  <rect x="390" y="140" width="320" height="10" fill="url(#apiKeyGrad)"/>
  <!-- Key icon -->
  <g transform="translate(406, 123)">
    <circle cx="6" cy="7" r="4" fill="none" stroke="#fff" stroke-width="1.5"/>
    <line x1="10" y1="7" x2="20" y2="7" stroke="#fff" stroke-width="1.5"/>
    <line x1="17" y1="7" x2="17" y2="11" stroke="#fff" stroke-width="1.5"/>
  </g>
  <text x="430" y="137" fill="#fff" font-size="14" font-weight="700">API Key / Bearer Token</text>
  <text x="410" y="170" fill="#cbd5e1" font-size="11">• Server-to-server / CLI / scripts</text>
  <text x="410" y="188" fill="#cbd5e1" font-size="11">• Static key in header: x-api-key</text>
  <text x="410" y="206" fill="#cbd5e1" font-size="11">• Simple, no OAuth dance</text>
  <text x="410" y="224" fill="#cbd5e1" font-size="11">• Rotate via key management</text>
  <text x="410" y="248" fill="#34d399" font-size="10" font-weight="600" font-style="italic">
    ✦ Best for: automation, CI/CD, internal
  </text>
  <text x="410" y="264" fill="#34d399" font-size="10" font-weight="600" font-style="italic">
    ✦ Middleware: validate key → ContextVar
  </text>

  <!-- Entra ID Card -->
  <rect x="740" y="112" width="320" height="175" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="740" y="112" width="320" height="38" rx="10" fill="url(#entraGrad)"/>
  <rect x="740" y="140" width="320" height="10" fill="url(#entraGrad)"/>
  <!-- Shield icon -->
  <g transform="translate(756, 121)">
    <path d="M10 2 L18 6 V12 C18 16 10 20 10 20 C10 20 2 16 2 12 V6 Z" fill="none" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
    <polyline points="7,11 9,13 14,8" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="780" y="137" fill="#fff" font-size="14" font-weight="700">Entra ID (Azure AD)</text>
  <text x="760" y="170" fill="#cbd5e1" font-size="11">• Enterprise / multi-tenant apps</text>
  <text x="760" y="188" fill="#cbd5e1" font-size="11">• JWT with org claims (oid, tid, roles)</text>
  <text x="760" y="206" fill="#cbd5e1" font-size="11">• Managed identity for Azure workloads</text>
  <text x="760" y="224" fill="#cbd5e1" font-size="11">• Conditional access &amp; MFA</text>
  <text x="760" y="248" fill="#fbbf24" font-size="10" font-weight="600" font-style="italic">
    ✦ Best for: enterprise, Azure-native apps
  </text>
  <text x="760" y="264" fill="#fbbf24" font-size="10" font-weight="600" font-style="italic">
    ✦ Token passthrough or AzureProvider
  </text>

  <!-- ============================================================ -->
  <!-- SECTION 2: JWT Claims → Tiering (middle)                    -->
  <!-- ============================================================ -->
  <text x="40" y="320" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">
    FREEMIUM / PREMIUM VIA JWT CLAIMS + METERING
  </text>
  <line x1="40" y1="328" x2="1060" y2="328" stroke="#334155" stroke-width="1"/>

  <!-- JWT Token -->
  <rect x="40" y="340" width="240" height="140" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="365" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">JWT Claims</text>
  <line x1="60" y1="375" x2="260" y2="375" stroke="#334155" stroke-width="1"/>
  <text x="70" y="398" fill="#e2e8f0" font-size="11" font-family="Consolas, monospace">"tier": "premium"</text>
  <text x="70" y="418" fill="#e2e8f0" font-size="11" font-family="Consolas, monospace">"oid": "abc-123"</text>
  <text x="70" y="438" fill="#e2e8f0" font-size="11" font-family="Consolas, monospace">"roles": ["mcp.admin"]</text>
  <text x="70" y="458" fill="#e2e8f0" font-size="11" font-family="Consolas, monospace">"quota_limit": 1000</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="410" x2="340" y2="410" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <defs>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>

  <!-- Tier Check Box -->
  <rect x="340" y="340" width="200" height="140" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="365" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">Tier Check</text>
  <line x1="360" y1="375" x2="520" y2="375" stroke="#334155" stroke-width="1"/>
  <text x="360" y="398" fill="#cbd5e1" font-size="11">Extract tier from claims</text>
  <text x="360" y="418" fill="#cbd5e1" font-size="11">Check usage meter</text>
  <text x="360" y="438" fill="#cbd5e1" font-size="11">Enforce rate limits</text>
  <text x="360" y="458" fill="#cbd5e1" font-size="11">Log to billing system</text>

  <!-- Arrow to Free -->
  <line x1="540" y1="390" x2="600" y2="370" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
  <!-- Arrow to Premium -->
  <line x1="540" y1="430" x2="600" y2="440" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowGold)"/>
  <defs>
    <marker id="arrowGold" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Free Tier -->
  <rect x="600" y="340" width="220" height="55" rx="8" fill="#1e293b" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="620" cy="367" r="6" fill="#64748b"/>
  <text x="632" y="362" fill="#94a3b8" font-size="12" font-weight="700">Free Tier</text>
  <text x="632" y="380" fill="#94a3b8" font-size="10">5 tools • 100 calls/day • basic models</text>

  <!-- Premium Tier -->
  <rect x="600" y="415" width="220" height="55" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <circle cx="620" cy="442" r="6" fill="#f59e0b"/>
  <text x="632" y="437" fill="#fbbf24" font-size="12" font-weight="700">Premium Tier</text>
  <text x="632" y="455" fill="#fbbf24" font-size="10">All tools • unlimited • advanced models</text>

  <!-- Metering Box -->
  <rect x="860" y="340" width="200" height="140" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="960" y="365" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">Usage Metering</text>
  <line x1="880" y1="375" x2="1040" y2="375" stroke="#334155" stroke-width="1"/>
  <!-- Bar chart -->
  <rect x="895" y="430" width="16" height="35" rx="2" fill="#6366f1" opacity="0.5"/>
  <rect x="917" y="415" width="16" height="50" rx="2" fill="#6366f1" opacity="0.65"/>
  <rect x="939" y="400" width="16" height="65" rx="2" fill="#6366f1" opacity="0.8"/>
  <rect x="961" y="390" width="16" height="75" rx="2" fill="#6366f1"/>
  <rect x="983" y="420" width="16" height="45" rx="2" fill="#6366f1" opacity="0.7"/>
  <rect x="1005" y="435" width="16" height="30" rx="2" fill="#6366f1" opacity="0.4"/>
  <text x="960" y="396" text-anchor="middle" fill="#cbd5e1" font-size="10">calls / day</text>
  <!-- Meter connector -->
  <line x1="820" y1="410" x2="860" y2="410" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ============================================================ -->
  <!-- SECTION 3: Upgrade vs Hide (bottom)                         -->
  <!-- ============================================================ -->
  <text x="40" y="518" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1.5">
    TOOL ACCESS STRATEGY — "UPGRADE REQUIRED" VS HIDING TOOLS
  </text>
  <line x1="40" y1="526" x2="1060" y2="526" stroke="#334155" stroke-width="1"/>

  <!-- Strategy A: Upgrade Required -->
  <rect x="40" y="540" width="500" height="155" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="568" fill="#93c5fd" font-size="14" font-weight="700">Strategy A: "Upgrade Required" Response</text>
  <line x1="60" y1="578" x2="520" y2="578" stroke="#334155" stroke-width="1"/>

  <!-- Tool list visible -->
  <rect x="60" y="590" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="115" y="609" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">query_graph</text>
  <rect x="60" y="624" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="115" y="643" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">search_docs</text>
  <rect x="60" y="658" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="115" y="677" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">🔒 deep_analyze</text>

  <!-- Arrow -->
  <text x="185" y="660" fill="#64748b" font-size="18">→</text>

  <!-- Response box -->
  <rect x="210" y="590" width="310" height="95" rx="8" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="230" y="614" fill="#fbbf24" font-size="11" font-family="Consolas, monospace">{"error": "upgrade_required",</text>
  <text x="230" y="632" fill="#fbbf24" font-size="11" font-family="Consolas, monospace"> "tool": "deep_analyze",</text>
  <text x="230" y="650" fill="#fbbf24" font-size="11" font-family="Consolas, monospace"> "required_tier": "premium",</text>
  <text x="230" y="668" fill="#fbbf24" font-size="11" font-family="Consolas, monospace"> "upgrade_url": "/upgrade"}</text>

  <!-- Pros -->
  <text x="280" y="700" fill="#34d399" font-size="10" font-weight="600">✓ Tools discoverable  ✓ Drives conversion  ✓ Transparent</text>

  <!-- VS divider -->
  <rect x="553" y="590" width="34" height="34" rx="17" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <text x="570" y="613" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">vs</text>

  <!-- Strategy B: Hide Tools -->
  <rect x="600" y="540" width="460" height="155" rx="10" fill="#1e293b" stroke="#64748b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="568" fill="#94a3b8" font-size="14" font-weight="700">Strategy B: Hide Premium Tools</text>
  <line x1="620" y1="578" x2="1040" y2="578" stroke="#334155" stroke-width="1"/>

  <!-- Free user sees -->
  <text x="620" y="600" fill="#64748b" font-size="10" font-weight="600">FREE USER SEES:</text>
  <rect x="620" y="610" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="629" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">query_graph</text>
  <rect x="620" y="644" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="675" y="663" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">search_docs</text>

  <!-- Premium user sees -->
  <text x="830" y="600" fill="#fbbf24" font-size="10" font-weight="600">PREMIUM USER SEES:</text>
  <rect x="830" y="610" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="885" y="629" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">query_graph</text>
  <rect x="830" y="644" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="885" y="663" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">search_docs</text>
  <rect x="950" y="610" width="110" height="28" rx="6" fill="#2d1f0e" stroke="#f59e0b" stroke-width="1"/>
  <text x="1005" y="629" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">deep_analyze</text>
  <rect x="950" y="644" width="110" height="28" rx="6" fill="#2d1f0e" stroke="#f59e0b" stroke-width="1"/>
  <text x="1005" y="663" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">batch_export</text>

  <!-- Pros -->
  <text x="730" y="700" fill="#34d399" font-size="10" font-weight="600">✓ Clean UX  ✓ No error noise  ✓ Reduced attack surface</text>

</svg>
